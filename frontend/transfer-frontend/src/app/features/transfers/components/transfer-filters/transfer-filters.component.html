<section class="card">
  <h2>Filtros de busqueda</h2>
  <form [formGroup]="form" (ngSubmit)="submitFilters()">
    <label>
      Client ID
      <input type="text" formControlName="clientId" placeholder="UUID del cliente" />
    </label>
    @if (form.controls.clientId.invalid && form.controls.clientId.touched) {
      <p class="error">Debes ingresar un Client ID para consultar.</p>
    }

    <label>
      Estado
      <select formControlName="status">
        @for (status of statuses; track status) {
          <option [value]="status">{{ status || 'Todos' }}</option>
        }
      </select>
    </label>

    <label>
      Tamaño de pagina
      <input type="number" formControlName="size" min="1" max="100" />
    </label>

    <button type="submit">Aplicar filtros</button>
  </form>
</section>
